name: secret-scan

# A product whose entire pitch is on-device secret redaction should scan its
# OWN source for committed credentials. gitleaks runs on every push/PR and on
# a weekly schedule over full history.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "42 5 * * 1"

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # scan full history, not just the tip
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required since gitleaks-action v2 to scan pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
