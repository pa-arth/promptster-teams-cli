name: secret-scan

# A product whose entire pitch is on-device secret redaction should scan its
# OWN source for committed credentials. gitleaks runs on every push/PR and on
# a weekly schedule over full history.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "42 5 * * 1"

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # scan full history, not just the tip
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          # Required since gitleaks-action v2 to scan pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
