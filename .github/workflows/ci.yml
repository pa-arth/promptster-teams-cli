name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

jobs:
  # Cross-platform build + tests. The CLI ships darwin + windows binaries and
  # has platform-split files (signing_lock_unix.go / signing_lock_windows.go),
  # so we exercise the unix runners AND cross-compile windows. Windows is
  # build-only, not test: the hosted windows runner enforces MANDATORY file
  # locking, so the advisory buffer-lock (LockFileEx vs unix flock) makes the
  # buffer read/write tests fail on windows only — a pre-existing platform gap
  # tracked separately, not a regression this CI should block on. Cross-
  # compiling still catches any windows build breakage.
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Windows: build-only (see job comment). Cross-compiled from the ubuntu
      # leg so a windows build break still fails CI without the flaky runner.
      - if: matrix.os == 'ubuntu-latest'
        run: GOOS=windows go build ./...

  # Exercise the per-user autostart service managers end-to-end on the two
  # platforms a dev Mac can't drive: register -> status -> deregister. This is
  # the only coverage that runs the real `schtasks` (Windows) and
  # `systemctl --user` (Linux) round-trips — the rest of CI only compiles them.
  # The schtasks /TR quoting round-trip in particular can't be verified any
  # other way. Credentials point at a dead localhost so a watcher the service
  # starts has zero external egress.
  autostart-smoke:
    name: autostart smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Linux: systemd --user needs a running user manager; enable-linger starts
      # one for the runner account, and XDG_RUNTIME_DIR points systemctl at it.
      - name: linux — systemd --user round-trip
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          go build -o /tmp/pt ./cmd/promptster-teams
          sudo loginctl enable-linger "$USER"
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          for i in $(seq 1 15); do systemctl --user show-environment >/dev/null 2>&1 && break; sleep 1; done
          mkdir -p ~/.promptster-teams
          printf '{"token":"PSE-TEST-TEST","apiUrl":"http://127.0.0.1:9"}\n' > ~/.promptster-teams/credentials
          /tmp/pt autostart enable
          /tmp/pt autostart status | tee /tmp/s1
          grep -q "systemd --user" /tmp/s1                       # enabled
          test -f ~/.config/systemd/user/promptster-teams.service
          grep -q "Restart=on-failure" ~/.config/systemd/user/promptster-teams.service
          /tmp/pt autostart disable
          /tmp/pt autostart status | tee /tmp/s2
          grep -qi "not enabled" /tmp/s2                          # deregistered
          test ! -f ~/.config/systemd/user/promptster-teams.service

      # Windows: Task Scheduler round-trip — the real test of the schtasks /TR
      # quoting (the binary path is double-quoted and re-parsed by schtasks).
      - name: windows — Task Scheduler round-trip
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          PROMPTSTER_TEAMS_TOKEN: PSE-TEST-TEST
        run: |
          set -euxo pipefail
          go build -o /tmp/pt.exe ./cmd/promptster-teams
          mkdir -p "$USERPROFILE/.promptster-teams"
          printf '{"token":"PSE-TEST-TEST","apiUrl":"http://127.0.0.1:9"}\n' > "$USERPROFILE/.promptster-teams/credentials"
          /tmp/pt.exe autostart enable
          /tmp/pt.exe autostart status | tee /tmp/s1
          grep -q "Task Scheduler" /tmp/s1                        # enabled
          schtasks //Query //TN "Promptster Teams"                # task really registered
          /tmp/pt.exe autostart disable
          /tmp/pt.exe autostart status | tee /tmp/s2
          grep -qi "not enabled" /tmp/s2                          # deregistered

  # Race detector + coverage. Requires cgo (a C toolchain), which the hosted
  # ubuntu runner has; kept separate from the matrix so Windows (no default
  # C compiler) isn't asked to run -race.
  race:
    name: race & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  lint:
    name: lint (gofmt, vet, staticcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi
      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  # Static application security testing. All findings (any severity) are
  # published to the GitHub Security tab as SARIF so reviewers can see them;
  # the gate itself fails only on HIGH-severity/HIGH-confidence findings.
  gosec:
    name: gosec (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gosec (report all → SARIF)
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -no-fail -fmt sarif -out gosec.sarif ./...
      - name: upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        continue-on-error: true
        with:
          sarif_file: gosec.sarif
          category: gosec
      - name: gate on HIGH findings
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -severity high -confidence high ./...

  # Dependency + stdlib CVE scan on the latest Go. Non-blocking: stdlib
  # findings track the Go release cycle (fixed by a toolchain bump when a
  # patch lands), so they must not gate merges — but they ARE surfaced in the
  # Security tab. Dependency findings here are actionable: bump the module.
  govulncheck:
    name: govulncheck (deps + stdlib CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable # scan against the newest patched stdlib
      - name: scan (SARIF)
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -format sarif ./... > govulncheck.sarif
      - name: upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        continue-on-error: true
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      - name: human-readable report
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # Guardrail: the teams CLI must contain ONLY capture + redaction + signing.
  # Fail the build if the sibling hiring product's anti-cheat / surveillance
  # surface ever creeps back into this source.
  audit-cleanliness:
    name: audit (no surveillance/anti-cheat logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: scan for forbidden terms
        run: |
          if grep -rinE 'honeypot|likelyPaste|consentToIntegrity|cadence enrichment' --include='*.go' .; then
            echo "::error::surveillance/anti-cheat term found in source — teams CLI must stay clean"
            exit 1
          fi
          echo "clean"
