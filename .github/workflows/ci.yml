name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

jobs:
  # Cross-platform build + tests. The CLI ships darwin + windows binaries and
  # has platform-split files (signing_lock_unix.go / signing_lock_windows.go),
  # so we exercise the unix runners AND cross-compile windows. Windows is
  # build-only, not test: the hosted windows runner enforces MANDATORY file
  # locking, so the advisory buffer-lock (LockFileEx vs unix flock) makes the
  # buffer read/write tests fail on windows only — a pre-existing platform gap
  # tracked separately, not a regression this CI should block on. Cross-
  # compiling still catches any windows build breakage.
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Windows: build-only (see job comment). Cross-compiled from the ubuntu
      # leg so a windows build break still fails CI without the flaky runner.
      - if: matrix.os == 'ubuntu-latest'
        run: GOOS=windows go build ./...

  # Exercise the per-user autostart service managers end-to-end on the two
  # platforms a dev Mac can't drive: register -> status -> stop -> deregister.
  # This is the only coverage that runs the real `schtasks` (Windows) and
  # `systemctl --user` (Linux) round-trips — the rest of CI only compiles them.
  # The schtasks /TR quoting round-trip in particular can't be verified any
  # other way. Credentials point at a dead localhost so a watcher the service
  # starts has zero external egress.
  #
  # The `stop` leg pins Manager.Stop's defining semantic: halt the service now,
  # but leave it REGISTERED so it returns at next login. That's what separates it
  # from `autostart disable`, and getting it wrong (deregistering, or leaving the
  # restart policy armed) is exactly the bug `stop` exists to fix.
  autostart-smoke:
    name: autostart smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Linux: systemd --user needs a running user manager; enable-linger starts
      # one for the runner account, and XDG_RUNTIME_DIR points systemctl at it.
      - name: linux — systemd --user round-trip
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          go build -o /tmp/pt ./cmd/promptster-teams
          sudo loginctl enable-linger "$USER"
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          for i in $(seq 1 15); do systemctl --user show-environment >/dev/null 2>&1 && break; sleep 1; done
          mkdir -p ~/.promptster-teams
          printf '{"token":"PSE-TEST-TEST","apiUrl":"http://127.0.0.1:9"}\n' > ~/.promptster-teams/credentials
          /tmp/pt autostart enable
          /tmp/pt autostart status | tee /tmp/s1
          grep -q "systemd --user" /tmp/s1                       # enabled
          test -f ~/.config/systemd/user/promptster-teams.service
          grep -q "Restart=on-failure" ~/.config/systemd/user/promptster-teams.service
          # `stop` halts the unit but must NOT deregister it: still enabled, now
          # inactive. A systemd-initiated stop also parks it for good — unlike a
          # SIGKILLed watcher, which Restart=on-failure would revive.
          /tmp/pt stop
          systemctl --user is-enabled promptster-teams.service     # still registered for next login
          test -f ~/.config/systemd/user/promptster-teams.service  # unit survives stop
          ! systemctl --user is-active --quiet promptster-teams.service   # really halted
          /tmp/pt autostart status | tee /tmp/s2
          grep -q "systemd --user" /tmp/s2                         # still reports enabled
          # `autostart repair` re-points an enabled unit at the binary running
          # NOW. It is the migration for engineers whose unit still names the old
          # in-node_modules path: the npm wrapper no longer ships binaries/, so
          # that path disappears on upgrade and the unit silently fails at the
          # next login. Simulate exactly that — a unit baked with a path we then
          # delete — and prove repair rescues it.
          cp /tmp/pt /tmp/pt-old
          /tmp/pt-old autostart enable
          grep -q "/tmp/pt-old" ~/.config/systemd/user/promptster-teams.service   # baked the old path
          rm -f /tmp/pt-old                                                       # the npm upgrade deletes it
          ! grep -q "^ExecStart=/tmp/pt " ~/.config/systemd/user/promptster-teams.service  # unit is now stale
          /tmp/pt autostart repair | tee /tmp/r1
          grep -q "re-pointed at" /tmp/r1
          grep -q "/tmp/pt" ~/.config/systemd/user/promptster-teams.service       # now names a binary that exists
          ! grep -q "pt-old" ~/.config/systemd/user/promptster-teams.service      # stale path gone
          systemctl --user is-enabled promptster-teams.service                    # still registered
          /tmp/pt stop

          /tmp/pt autostart disable
          /tmp/pt autostart status | tee /tmp/s3
          grep -qi "not enabled" /tmp/s3                           # deregistered
          test ! -f ~/.config/systemd/user/promptster-teams.service

          # repair must be a silent no-op (exit 0) when autostart was never
          # enabled — it runs inside `npm install`, where any non-zero exit
          # aborts the install and leaves the engineer with no CLI at all.
          /tmp/pt autostart repair | tee /tmp/r2
          test ! -s /tmp/r2
          test ! -f ~/.config/systemd/user/promptster-teams.service

      # Windows: Task Scheduler round-trip — the real test of the schtasks /TR
      # quoting (the binary path is double-quoted and re-parsed by schtasks).
      - name: windows — Task Scheduler round-trip
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          PROMPTSTER_TEAMS_TOKEN: PSE-TEST-TEST
        run: |
          set -euxo pipefail
          go build -o /tmp/pt.exe ./cmd/promptster-teams
          mkdir -p "$USERPROFILE/.promptster-teams"
          printf '{"token":"PSE-TEST-TEST","apiUrl":"http://127.0.0.1:9"}\n' > "$USERPROFILE/.promptster-teams/credentials"
          /tmp/pt.exe autostart enable
          /tmp/pt.exe autostart status | tee /tmp/s1
          grep -q "Task Scheduler" /tmp/s1                        # enabled
          schtasks //Query //TN "Promptster Teams"                # task really registered
          # `stop` ends the running instance but must leave the task registered.
          /tmp/pt.exe stop
          schtasks //Query //TN "Promptster Teams"                # survives stop
          /tmp/pt.exe autostart status | tee /tmp/s2
          grep -q "Task Scheduler" /tmp/s2                        # still reports enabled
          /tmp/pt.exe autostart disable
          /tmp/pt.exe autostart status | tee /tmp/s3
          grep -qi "not enabled" /tmp/s3                          # deregistered

  # Race detector + coverage. Requires cgo (a C toolchain), which the hosted
  # ubuntu runner has; kept separate from the matrix so Windows (no default
  # C compiler) isn't asked to run -race.
  race:
    name: race & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  lint:
    name: lint (gofmt, vet, staticcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi
      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  # The binary ships as six per-platform npm packages pinned to the wrapper's
  # exact version. The platform set is written out in FOUR files that nothing
  # cross-checks (build.js, resolve.js, check-binaries.js, package.json's
  # optionalDependencies), and both drift directions fail SILENTLY on the one
  # platform that was missed:
  #
  #   compiled but not resolved -> that platform gets "no binary found"
  #   pinned but not published  -> a missing OPTIONAL dep is a SUCCESSFUL npm
  #                                install, so the CLI just has no binary
  #
  # check-binaries.js catches some of this, but only at prepublish — after a tag
  # is cut. This runs on every PR, needs no Go build (~50ms of source parsing),
  # so drift dies at review time instead of release time.
  npm-platforms:
    name: npm platform lists in lockstep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Same pinned SHA release.yml already uses — do not swap it for a
      # different pin without checking that one first.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - name: platform lists + version pins agree
        working-directory: npm
        run: node scripts/check-platform-lists.js
      - name: npm scripts parse
        working-directory: npm
        run: |
          for f in lib/resolve.js bin/promptster-teams.js scripts/postinstall.js \
                   scripts/build.js scripts/check-binaries.js scripts/check-platform-lists.js; do
            node --check "$f" || exit 1
          done
          echo "✓ all npm scripts parse"

  # Static application security testing. All findings (any severity) are
  # published to the GitHub Security tab as SARIF so reviewers can see them;
  # the gate itself fails only on HIGH-severity/HIGH-confidence findings.
  gosec:
    name: gosec (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gosec (report all → SARIF)
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -no-fail -fmt sarif -out gosec.sarif ./...
      - name: upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        continue-on-error: true
        with:
          sarif_file: gosec.sarif
          category: gosec
      - name: gate on HIGH findings
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -severity high -confidence high ./...

  # Dependency + stdlib CVE scan on the latest Go. Non-blocking: stdlib
  # findings track the Go release cycle (fixed by a toolchain bump when a
  # patch lands), so they must not gate merges — but they ARE surfaced in the
  # Security tab. Dependency findings here are actionable: bump the module.
  govulncheck:
    name: govulncheck (deps + stdlib CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable # scan against the newest patched stdlib
      - name: scan (SARIF)
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -format sarif ./... > govulncheck.sarif
      - name: upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        continue-on-error: true
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      - name: human-readable report
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # install.sh verifies the minisign SIGNATURE over SHA256SUMS before trusting
  # any checksum — the SAME trust root the auto-updater enforces (a checksum
  # fetched from the same release only catches corruption, not an attacker who
  # rewrites both the binary and SHA256SUMS). That verification embeds THREE
  # copies of the release public key — install.sh (MINISIGN_PUBKEY + the derived
  # SPKI PEM), internal/selfupdate/verify.go, and minisign.pub — which must never
  # drift; on key rotation, a stale copy silently means "cannot verify" for that
  # path. This job pins both properties: the keys agree, and the OpenSSL fallback
  # in install.sh actually verifies a real (throwaway-key) signature on Linux —
  # accepting an authentic one and rejecting a tampered or wrong-key one.
  installer-signature:
    name: installer signature verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: trust-root key material agrees (install.sh / minisign.pub / verify.go)
        run: |
          set -euo pipefail
          PUB_FILE="$(sed -n '2p' minisign.pub)"
          PUB_SH="$(grep -E '^MINISIGN_PUBKEY=' install.sh | sed -E 's/^MINISIGN_PUBKEY="([^"]*)"/\1/')"
          PUB_GO="$(grep -E 'minisignPublicKey =' internal/selfupdate/verify.go | sed -E 's/.*"([^"]*)".*/\1/')"
          [ "$PUB_SH" = "$PUB_FILE" ] || { echo "::error::install.sh MINISIGN_PUBKEY != minisign.pub"; exit 1; }
          [ "$PUB_GO" = "$PUB_FILE" ] || { echo "::error::internal/selfupdate/verify.go key != minisign.pub"; exit 1; }
          # The SPKI PEM embedded for the OpenSSL fallback must be the Ed25519
          # half of that same key.
          printf '%s' "$PUB_FILE" | openssl base64 -d -A | tail -c 32 > /tmp/rawpub
          { printf '302a300506032b6570032100' | xxd -r -p; cat /tmp/rawpub; } > /tmp/spki.der
          openssl pkey -pubin -inform DER -in /tmp/spki.der -out /tmp/derived.pem
          awk '/SIGN_PUBKEY_PEM="-----BEGIN/{f=1} f{print} /END PUBLIC KEY-----"/{if(f)exit}' install.sh \
            | sed -E 's/^SIGN_PUBKEY_PEM="//; s/"$//' > /tmp/embedded.pem
          diff <(openssl pkey -pubin -in /tmp/derived.pem -outform PEM) \
               <(openssl pkey -pubin -in /tmp/embedded.pem -outform PEM) \
            || { echo "::error::install.sh SIGN_PUBKEY_PEM is not the Ed25519 half of minisign.pub"; exit 1; }
          echo "trust-root key material consistent across all three files"
      - name: OpenSSL fallback verifies a real signature on Linux
        shell: bash
        run: |
          set -euo pipefail
          # No release secret key in CI, so exercise the verification LOGIC with a
          # throwaway keypair: the byte-slicing, BLAKE2b-512 prehash, Ed25519
          # verify and keyid guard are all key-independent.
          minisign -G -W -p /tmp/t.pub -s /tmp/t.key >/dev/null
          echo "checksums-under-test" > /tmp/SUMS
          minisign -S -s /tmp/t.key -m /tmp/SUMS >/dev/null
          # Our releases sign prehashed ('ED'); assert the runner's minisign does too.
          [ "$(sed -n '2p' /tmp/SUMS.minisig | openssl base64 -d -A | dd bs=1 count=2 2>/dev/null)" = "ED" ] \
            || { echo "::error::test signature is not prehashed 'ED'"; exit 1; }
          TPUB="$(sed -n '2p' /tmp/t.pub)"
          printf '%s' "$TPUB" | openssl base64 -d -A | tail -c 32 > /tmp/traw
          { printf '302a300506032b6570032100' | xxd -r -p; cat /tmp/traw; } > /tmp/tspki.der
          openssl pkey -pubin -inform DER -in /tmp/tspki.der -out /tmp/tpem.pem
          # Extract and source the REAL functions from install.sh (no copy that can
          # drift). The block sits between the two '---' markers and does NOT define
          # ok/warn/die, so stub those first. Then override the two key constants to
          # the throwaway key before calling verify_with_openssl.
          awk '/^# --- Release trust root/{p=1} p{print} /^# -{20,}$/{if(p)exit}' install.sh > /tmp/funcs.sh
          ok(){ :; }; warn(){ :; }; die(){ echo "die: $*" >&2; return 1; }
          # shellcheck disable=SC1091
          . /tmp/funcs.sh
          MINISIGN_PUBKEY="$TPUB"
          SIGN_PUBKEY_PEM="$(cat /tmp/tpem.pem)"
          O="$(find_capable_openssl)" || { echo "::error::no capable OpenSSL on runner"; exit 1; }
          echo "using $O"
          verify_with_openssl "$O" /tmp/SUMS /tmp/SUMS.minisig \
            || { echo "::error::authentic signature rejected"; exit 1; }
          echo "  authentic accepted"
          cp /tmp/SUMS /tmp/tamp; echo tamper >> /tmp/tamp
          verify_with_openssl "$O" /tmp/tamp /tmp/SUMS.minisig \
            && { echo "::error::tampered file accepted"; exit 1; } || true
          echo "  tampered rejected"
          minisign -G -W -p /tmp/w.pub -s /tmp/w.key >/dev/null
          minisign -S -s /tmp/w.key -m /tmp/SUMS -x /tmp/wrong.minisig >/dev/null
          verify_with_openssl "$O" /tmp/SUMS /tmp/wrong.minisig \
            && { echo "::error::signature from a different key accepted"; exit 1; } || true
          echo "  wrong-key rejected"

  # Guardrail: the teams CLI must contain ONLY capture + redaction + signing.
  # Fail the build if the sibling hiring product's anti-cheat / surveillance
  # surface ever creeps back into this source.
  audit-cleanliness:
    name: audit (no surveillance/anti-cheat logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: scan for forbidden terms
        run: |
          if grep -rinE 'honeypot|likelyPaste|consentToIntegrity|cadence enrichment' --include='*.go' .; then
            echo "::error::surveillance/anti-cheat term found in source — teams CLI must stay clean"
            exit 1
          fi
          echo "clean"
