name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm provenance (SLSA build attestation)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify npm package version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./npm/package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::npm/package.json version ($PKG_VERSION) != tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: node npm/scripts/build.js "${{ steps.version.outputs.VERSION }}"

      - name: Check binaries
        run: node npm/scripts/check-binaries.js

      - name: Sign SHA256SUMS (minisign)
        env:
          # Unencrypted minisign secret key (full file contents, incl. the
          # "untrusted comment:" line). The matching PUBLIC key is embedded in
          # the CLI (internal/selfupdate/verify.go) and committed as minisign.pub.
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "${MINISIGN_SECRET_KEY}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — auto-update clients will REJECT this release"
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y minisign
          KEYFILE="$(mktemp)"
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${KEYFILE}"
          chmod 600 "${KEYFILE}"
          # Key is unencrypted, so no password prompt; stdin from /dev/null keeps
          # it non-interactive. Signs in place → npm/binaries/SHA256SUMS.minisig,
          # which the `npm/binaries/*` glob then uploads to the release.
          minisign -S -s "${KEYFILE}" -m npm/binaries/SHA256SUMS < /dev/null
          rm -f "${KEYFILE}"
          test -f npm/binaries/SHA256SUMS.minisig
          echo "Signed SHA256SUMS:"
          cat npm/binaries/SHA256SUMS.minisig

      - name: Publish to npm (idempotent)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="@promptster/teams-cli"
          VER="${{ steps.version.outputs.VERSION }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}; skipping."
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          # Recreate the tag's release idempotently.
          gh release delete "v${VER}" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "v${VER}" \
            --title "v${VER}" \
            --generate-notes \
            npm/binaries/* install.sh
