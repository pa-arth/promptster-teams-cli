name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm provenance (SLSA build attestation)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify npm package version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./npm/package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::npm/package.json version ($PKG_VERSION) != tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: node npm/scripts/build.js "${{ steps.version.outputs.VERSION }}"

      - name: Check binaries
        run: node npm/scripts/check-binaries.js

      - name: Sign SHA256SUMS (minisign)
        env:
          # Unencrypted minisign secret key (full file contents, incl. the
          # "untrusted comment:" line). The matching PUBLIC key is embedded in
          # the CLI (internal/selfupdate/verify.go) and committed as minisign.pub.
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "${MINISIGN_SECRET_KEY}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — auto-update clients will REJECT this release"
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y minisign
          KEYFILE="$(mktemp)"
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${KEYFILE}"
          chmod 600 "${KEYFILE}"
          # Key is unencrypted, so no password prompt; stdin from /dev/null keeps
          # it non-interactive. Signs in place → npm/binaries/SHA256SUMS.minisig,
          # which the `npm/binaries/*` glob then uploads to the release.
          minisign -S -s "${KEYFILE}" -m npm/binaries/SHA256SUMS < /dev/null
          rm -f "${KEYFILE}"
          test -f npm/binaries/SHA256SUMS.minisig
          # Guard: verify the signature we just produced against the PUBLIC key
          # committed to the repo (the same key embedded in every client via
          # internal/selfupdate/verify.go). If MINISIGN_SECRET_KEY is a valid
          # minisign key but NOT the private half of minisign.pub, every client
          # would reject the update — fail the release here instead of shipping a
          # dead signature.
          minisign -V -p minisign.pub -m npm/binaries/SHA256SUMS
          echo "Signed SHA256SUMS (verified against committed minisign.pub):"
          cat npm/binaries/SHA256SUMS.minisig

      # ORDER IS LOAD-BEARING. The wrapper's optionalDependencies pin these six
      # exactly, and npm treats an UNRESOLVABLE optional dep as a SUCCESSFUL
      # install — no error, no warning, just a CLI with no binary. So every
      # platform package must exist on the registry BEFORE the wrapper that
      # references them can be installed by anyone.
      #
      # Publishing the wrapper first would open a window where `npm i -g` yields
      # a silently broken install; publishing it last means the worst case is a
      # loud release failure with no wrapper published at all, which is the
      # failure we want.
      - name: Publish platform packages to npm (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.VERSION }}"
          for dir in npm/platforms/*/; do
            NAME="$(node -p "require('./${dir}package.json').name")"
            KEY="$(basename "${dir}")"
            case "${KEY}" in win32-*) BIN="promptster-teams.exe" ;; *) BIN="promptster-teams" ;; esac

            if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
              # Already published. npm versions are IMMUTABLE, so "skip" is only
              # safe if what is up there is what we just built. It is not always:
              # if a release publishes 3/6 packages, fails, and the tag is then
              # MOVED to a corrected commit and re-run, the 3 already up there
              # keep the OLD binary while the other 3 get the new one — and the
              # wrapper would ship pointing at that mix. darwin users would run
              # different code from linux users under one version number, and no
              # step would notice.
              #
              # So compare CONTENT, not just the version. sha256 the binary
              # inside the published tarball against the one we just compiled.
              # (Tarball-level integrity is useless here: tar embeds timestamps,
              # so a byte-identical build still produces a different tarball hash.)
              TMP="$(mktemp -d)"
              npm pack "${NAME}@${VER}" --pack-destination "${TMP}" --silent >/dev/null 2>&1
              tar -xzf "${TMP}"/*.tgz -C "${TMP}"
              PUBLISHED="$(shasum -a 256 "${TMP}/package/${BIN}" | awk '{print $1}')"
              LOCAL="$(shasum -a 256 "${dir}${BIN}" | awk '{print $1}')"
              rm -rf "${TMP}"
              if [ "${PUBLISHED}" != "${LOCAL}" ]; then
                echo "::error::${NAME}@${VER} is already published with a DIFFERENT binary."
                echo "  published sha256: ${PUBLISHED}"
                echo "  locally built:    ${LOCAL}"
                echo "npm versions are immutable, so this cannot be corrected in place —"
                echo "publishing the wrapper now would ship a mix of old and new binaries"
                echo "under one version. Bump to a new version instead of moving the tag."
                exit 1
              fi
              echo "Already published ${NAME}@${VER} (binary matches); skipping."
            else
              (cd "${dir}" && npm publish --provenance --access public)
            fi
          done

      # Belt and braces: the loop above could publish 5/6 and still exit 0 if a
      # dir were missing entirely. Assert every pin the wrapper is about to ship
      # actually resolves on the registry before we ship it.
      - name: Verify every optionalDependency resolves before publishing wrapper
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.VERSION }}"
          MISSING=""
          # Retry with backoff. A package npm has ACCEPTED can take a moment to
          # become visible to `npm view` (registry/CDN propagation), so a single
          # lookup here would abort an otherwise-valid release — and worse, it
          # would abort it AFTER the platform packages are published, i.e. in the
          # one state that cannot be undone. Only a package still unresolvable
          # after ~1m is treated as genuinely absent.
          for NAME in $(node -p "Object.keys(require('./npm/package.json').optionalDependencies||{}).join('\n')"); do
            FOUND=""
            for DELAY in 0 2 4 8 15 30; do
              [ "${DELAY}" -gt 0 ] && sleep "${DELAY}"
              if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
                FOUND=1
                break
              fi
            done
            if [ -n "${FOUND}" ]; then
              echo "  ok ${NAME}@${VER}"
            else
              echo "  MISSING ${NAME}@${VER} (still unresolvable after ~1m)"
              MISSING="${MISSING} ${NAME}"
            fi
          done
          if [ -n "${MISSING}" ]; then
            echo "::error::Refusing to publish the wrapper: unresolvable optionalDependencies:${MISSING}"
            echo "npm treats a missing optional dep as a successful install, so shipping the"
            echo "wrapper now would give engineers a CLI with no binary and no error."
            exit 1
          fi

      - name: Publish wrapper to npm (idempotent)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="@promptster/teams-cli"
          VER="${{ steps.version.outputs.VERSION }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}; skipping."
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          # Recreate the tag's release idempotently.
          gh release delete "v${VER}" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "v${VER}" \
            --title "v${VER}" \
            --generate-notes \
            npm/binaries/* install.sh
