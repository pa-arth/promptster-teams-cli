name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm provenance (SLSA build attestation)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify npm package version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./npm/package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::npm/package.json version ($PKG_VERSION) != tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: node npm/scripts/build.js "${{ steps.version.outputs.VERSION }}"

      - name: Check binaries
        run: node npm/scripts/check-binaries.js

      - name: Publish to npm (idempotent)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="@promptster/teams-cli"
          VER="${{ steps.version.outputs.VERSION }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}; skipping."
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          # Recreate the tag's release idempotently.
          gh release delete "v${VER}" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "v${VER}" \
            --title "v${VER}" \
            --generate-notes \
            npm/binaries/* install.sh
