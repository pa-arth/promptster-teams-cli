version: 2
updates:
  # Go module dependencies — includes the security-critical Titus redaction
  # engine and its transitive tree.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns: ["*"]

  # npm distribution wrapper.
  - package-ecosystem: npm
    directory: "/npm"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the pin and
  # the trailing version comment together). Grouped into one PR: codeql-action's
  # sub-actions must all run the same version, so per-action PRs are unmergeable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
