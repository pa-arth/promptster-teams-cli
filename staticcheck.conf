# staticcheck configuration — https://staticcheck.dev/docs/configuration/
#
# Inherit the full default analyzer set. The SA-series bug checks are the ones a
# security reviewer cares about, and U1000 ("unused") is left ON so dead code
# can't accumulate: the background-daemon lifecycle is now wired to the
# `start`/`stop` commands, so nothing is intentionally-unused anymore.
checks = ["inherit"]
