# staticcheck configuration — https://staticcheck.dev/docs/configuration/
#
# We inherit the full default analyzer set (the SA-series bug checks are the
# ones a security reviewer cares about) but disable U1000 "unused" reporting:
# the background-daemon lifecycle helpers (ensure/start/stop watcher,
# kill-stale-daemons, active-workspace state) are intentional scaffolding for
# the roadmapped persistent-background-running mode and are not yet wired to a
# command. Re-enable U1000 once that mode ships.
checks = ["inherit", "-U1000"]
